kind = "mobile"
previewPath = "/raasta-mobile/"
title = "Raasta Pakistan — Mobile"
version = "1.0.0"
id = "artifacts/raasta-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/raasta-mobile/" ]
localPort = 20737

[services.development]
run = "pnpm --filter @workspace/raasta-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/raasta-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/raasta-mobile", "run", "serve" ]

[services.env]
PORT = "20737"
BASE_PATH = "/raasta-mobile/"
