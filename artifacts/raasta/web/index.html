<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Raasta - Pakistan Traffic Alert">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Raasta">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Raasta - Pakistan Traffic Alert</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #C62828; overflow: hidden; }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #3A0000, #8B0007, #C62828);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transition: opacity 0.35s ease;
      z-index: 9999;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    /* Decorative orbs */
    .orb { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.06); }
    .orb1 { width: 200px; height: 200px; top: -60px; right: -60px; }
    .orb2 { width: 120px; height: 120px; top: 80px; right: 80px; }
    .orb3 { width: 160px; height: 160px; bottom: 120px; left: -40px; }

    /* Centre content */
    .center-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      flex: 1;
      justify-content: center;
    }
    .logo-circle {
      width: 84px; height: 84px;
      border: 2px solid rgba(255,255,255,0.45);
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
      font-size: 38px;
    }
    .app-name {
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: 4px;
      margin: 0 0 8px;
    }
    .tagline {
      font-size: 13px;
      opacity: 0.72;
      letter-spacing: 1px;
      margin: 0 0 36px;
    }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid rgba(255,255,255,0.22);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Averox logo at bottom — all white via CSS filter */
    .brand-footer {
      padding-bottom: max(28px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .brand-label {
      font-size: 10px;
      letter-spacing: 1.5px;
      opacity: 0.5;
      text-transform: uppercase;
    }
    .averox-logo {
      height: 22px;
      width: auto;
      /* Convert to all-white */
      filter: brightness(0) invert(1);
      opacity: 0.75;
    }
  </style>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { if (!r.scope.includes('flutter')) r.unregister(); });
      });
    }

    function hideSplash() {
      var el = document.getElementById('loading');
      if (el && !el.classList.contains('hidden')) {
        el.classList.add('hidden');
        setTimeout(function() { el.style.display = 'none'; }, 380);
      }
    }

    // Primary: flutter signals its first painted frame
    window.addEventListener('flutter-first-frame', hideSplash);

    // Fallback: poll for the Flutter canvas element
    var _poll = setInterval(function() {
      if (document.querySelector('flt-glass-pane') || document.querySelector('flutter-view')) {
        clearInterval(_poll);
        hideSplash();
      }
    }, 150);

    // Hard cap: never show splash longer than 8 seconds
    setTimeout(function() { clearInterval(_poll); hideSplash(); }, 8000);
  </script>
</head>
<body>
  <div id="loading">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <div class="center-content">
      <div class="logo-circle">🚦</div>
      <h1 class="app-name">Raasta</h1>
      <p class="tagline">راستہ &nbsp;·&nbsp; Pakistan Traffic Alert</p>
      <div class="spinner"></div>
    </div>

    <div class="brand-footer">
      <span class="brand-label">Powered by</span>
      <img src="averox_logo.png" alt="Averox" class="averox-logo" />
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
