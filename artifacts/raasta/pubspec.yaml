name: raasta
description: Raasta - Pakistan Traffic Alert App for Islamabad & Rawalpindi
publish_to: "none"
version: 1.0.0+7

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  intl: ^0.19.0
  uuid: ^4.4.2
  http: ^1.2.2
  cupertino_icons: ^1.0.8
  geolocator: ^14.0.2
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
